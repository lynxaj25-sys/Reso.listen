<!DOCTYPE html>
<html>
<head>
  <title>Resonance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="particles"></canvas>

<!-- ⚡ LOADER -->
<div id="loader">
  <div class="logo">Resonance</div>
</div>

<!-- 🎬 LOGO INTRO -->
<div id="logo-intro">
  <div class="logo-anim">Resonance</div>
</div>

<!-- 🎧 MINI PLAYER -->
<div id="mini-player" class="mini-player hidden">
  <img id="mini-img">
  <div class="mini-info">
    <h4 id="mini-title"></h4>
    <p id="mini-artist"></p>
  </div>
  <button id="mini-play">⏯</button>
</div>

<!-- 🎧 SECTIONS -->
<div class="section">
  <h2>Recently Played</h2>
  <div class="row" id="recent-container"></div>
</div>

<div class="section">
  <h2>Pop goes the Music!</h2>
  <div class="row" id="trending-container"></div>
</div>

<div class="section">
  <h2>Adrenaline Action</h2>
  <div class="row" id="new-container"></div>
</div>

<!-- 📰 NEWS -->
<div class="news-section">
  <h2>📰 Latest News</h2>

  <div class="news-card">
    <div class="news-content">
      <h3>Drake Announces “Iceman” Album</h3>
      <p>Album drops May 15, 2026.</p>
      <p class="news-highlight">Already going viral.</p>
    </div>
    <img src="images/iceman.jpg" class="news-img">
  </div>
</div>

<!-- 🎧 PLAYER -->
<div id="player" class="hidden">
  <div class="player-content">
    <span id="close">✖</span>
    <img id="player-img">
    <h2 id="player-title"></h2>
    <p id="player-artist"></p>
    <p id="player-album"></p>

    <div class="equalizer">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <audio id="audio" controls></audio>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
